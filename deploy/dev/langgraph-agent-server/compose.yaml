# -----------------------------------------------------------------------------
# 文件: deploy/dev/langgraph-agent-server/compose.yaml
# 作用: Dev 环境 LangGraph Agent Server 编排定义与开发互通底座。
# 范围:
#   - 部署/调试 veterinaryAgent 的 LangGraph Agent Server 运行容器。
#   - 本地开发默认使用 compose 内 Redis，避免本机无法访问 VPC 内网云 Redis。
#     如在 dev-01 内运行且需复用云 Redis，可通过 LANGGRAPH_REDIS_URI 覆盖。
#   - 提供 Agent Server 专用 PostgreSQL 容器作为 Dev 临时状态库。
#     当前 Dev RDS 为 MySQL 8.0，不能作为 LangGraph Agent Server 的
#     DATABASE_URI；后续如 infra 提供托管 PostgreSQL，可用
#     LANGGRAPH_DATABASE_URI 覆盖并移除 langgraph-postgres 服务。
#   - 打通宿主机与容器内服务互访：宿主机访问 Agent Server 用
#     http://127.0.0.1:8123，容器访问宿主机服务用
#     http://host.docker.internal:<port>。
# 注意:
#   - 不提交 .env 或任何密码；请复制 .env.example 后在部署目录本地维护，
#     或通过 CI Secret / infra 注入。
#   - Agent Server 只监听宿主机 127.0.0.1:8123，公网/WG 入口应由现有
#     Compose Nginx 统一反代。
#   - 当前 graph 入口未就绪时，可使用 LangGraph 官方基础镜像做底座烟测；
#     正式业务镜像后续应由 app-repo CI 通过 `langgraph build` 产出。
# -----------------------------------------------------------------------------

name: veterinary-agent-langgraph-dev

x-host-gateway: &host-gateway
  - "host.docker.internal:host-gateway"

services:
  langgraph-agent-server:
    image: ${LANGGRAPH_AGENT_IMAGE:-langchain/langgraph-api:3.13}
    container_name: veterinary-agent-langgraph
    profiles:
      - agent-server
    restart: unless-stopped
    init: true

    ports:
      - "127.0.0.1:${LANGGRAPH_AGENT_SERVER_PORT:-8123}:8000"

    extra_hosts: *host-gateway

    environment:
      ENV: ${ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      # LangGraph Agent Server runtime. Standalone Agent Server requires
      # PostgreSQL for durable threads/runs/checkpoints and Redis for queue,
      # pub/sub, cancellation, and streaming coordination.
      DATABASE_URI: ${LANGGRAPH_DATABASE_URI:-postgresql://${LANGGRAPH_POSTGRES_USER:-langgraph}:${LANGGRAPH_POSTGRES_PASSWORD:?Set LANGGRAPH_POSTGRES_PASSWORD or LANGGRAPH_DATABASE_URI}@langgraph-postgres:5432/${LANGGRAPH_POSTGRES_DB:-langgraph_dev}?sslmode=disable}
      REDIS_URI: ${LANGGRAPH_REDIS_URI:-redis://${LANGGRAPH_REDIS_USERNAME:-default}:${LANGGRAPH_REDIS_PASSWORD:?Set LANGGRAPH_REDIS_PASSWORD or LANGGRAPH_REDIS_URI}@langgraph-redis:6379/${LANGGRAPH_REDIS_DB:-0}}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-veterinaryAgent:langgraph:}
      REDIS_HOST: ${REDIS_HOST:-langgraph-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_USERNAME: ${REDIS_USERNAME:-default}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD to match LANGGRAPH_REDIS_PASSWORD for local Redis}
      REDIS_DB: ${REDIS_DB:-0}

      # Stable URLs for host/container interop. Use the host URL when code runs
      # on dev-01 directly; use the internal URL when another container joins
      # the veterinary-agent-dev network.
      AGENT_SERVER_BASE_URL_HOST: ${AGENT_SERVER_BASE_URL_HOST:-http://127.0.0.1:8123}
      AGENT_SERVER_BASE_URL_INTERNAL: ${AGENT_SERVER_BASE_URL_INTERNAL:-http://langgraph-agent-server:8000}
      API_INGRESS_BASE_URL: ${API_INGRESS_BASE_URL:-http://host.docker.internal:8080}
      HOST_GATEWAY_BASE_URL: ${HOST_GATEWAY_BASE_URL:-http://host.docker.internal}

      # License / tracing controls. Keep tracing off by default in Dev unless
      # the team explicitly enables LangSmith trace upload.
      LANGGRAPH_CLOUD_LICENSE_KEY: ${LANGGRAPH_CLOUD_LICENSE_KEY:?Set LANGGRAPH_CLOUD_LICENSE_KEY}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}

      # Conservative Dev worker sizing for dev-01. Increase only after measuring
      # CPU, memory, Redis, and database pressure.
      N_JOBS_PER_WORKER: ${N_JOBS_PER_WORKER:-2}
      BG_JOB_ISOLATED_LOOPS: ${BG_JOB_ISOLATED_LOOPS:-false}
      LANGGRAPH_POSTGRES_POOL_MAX_SIZE: ${LANGGRAPH_POSTGRES_POOL_MAX_SIZE:-10}
      REDIS_MAX_CONNECTIONS: ${REDIS_MAX_CONNECTIONS:-200}
      BG_JOB_MAX_RETRIES: ${BG_JOB_MAX_RETRIES:-3}
      BG_JOB_SHUTDOWN_GRACE_PERIOD_SECS: ${BG_JOB_SHUTDOWN_GRACE_PERIOD_SECS:-180}
      RESUMABLE_STREAM_TTL_SECONDS: ${RESUMABLE_STREAM_TTL_SECONDS:-300}
      MOUNT_PREFIX: ${MOUNT_PREFIX:-}

      # Project-level infrastructure pass-through for graph nodes that need the
      # existing Dev stores. These are not used as Agent Server checkpoint state.
      DB_HOST: ${DB_HOST:-rm-bp1wjjf373l7t331v.mysql.rds.aliyuncs.com}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-app_dev}
      DB_USER: ${DB_USER:-app_dev}
      DB_PASSWORD: ${DB_PASSWORD:-}
      OSS_BUCKET: ${OSS_BUCKET:-infra-dev-file-storage}
      OSS_PREFIX: ${OSS_PREFIX:-}
      OSS_ENDPOINT: ${OSS_ENDPOINT:-oss-cn-hangzhou-internal.aliyuncs.com}

    depends_on:
      langgraph-postgres:
        condition: service_healthy
      langgraph-redis:
        condition: service_healthy

    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import json, os, urllib.request;
          prefix = os.environ.get('MOUNT_PREFIX', '').rstrip('/');
          url = f'http://127.0.0.1:8000{prefix}/ok?check_db=1';
          response = urllib.request.urlopen(url, timeout=3);
          payload = json.loads(response.read());
          raise SystemExit(0 if response.status == 200 and payload.get('ok') else 1)"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s

    logging:
      driver: json-file
      options:
        max-size: ${LANGGRAPH_LOG_MAX_SIZE:-50m}
        max-file: ${LANGGRAPH_LOG_MAX_FILE:-5}

    networks:
      veterinary-agent-dev:
        aliases:
          - agent-server
          - langgraph-api
          - veterinary-agent-langgraph

  langgraph-redis:
    image: redis:7-alpine
    container_name: veterinary-agent-langgraph-redis
    restart: unless-stopped

    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${LANGGRAPH_REDIS_PASSWORD:?Set LANGGRAPH_REDIS_PASSWORD}

    ports:
      # Dev-only loopback port for local tools. Containers should use
      # redis://default:<password>@langgraph-redis:6379/0 instead.
      - "127.0.0.1:${LANGGRAPH_REDIS_HOST_PORT:-16379}:6379"

    volumes:
      - langgraph-redis-data:/data

    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$${LANGGRAPH_REDIS_PASSWORD}" --no-auth-warning PING | grep -q PONG
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

    environment:
      LANGGRAPH_REDIS_PASSWORD: ${LANGGRAPH_REDIS_PASSWORD:?Set LANGGRAPH_REDIS_PASSWORD}
      TZ: Asia/Shanghai

    logging:
      driver: json-file
      options:
        max-size: ${REDIS_LOG_MAX_SIZE:-20m}
        max-file: ${REDIS_LOG_MAX_FILE:-3}

    networks:
      veterinary-agent-dev:
        aliases:
          - redis
          - agent-redis
          - langgraph-cache

  langgraph-postgres:
    image: postgres:16-alpine
    container_name: veterinary-agent-langgraph-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${LANGGRAPH_POSTGRES_DB:-langgraph_dev}
      POSTGRES_USER: ${LANGGRAPH_POSTGRES_USER:-langgraph}
      POSTGRES_PASSWORD: ${LANGGRAPH_POSTGRES_PASSWORD:?Set LANGGRAPH_POSTGRES_PASSWORD}
      TZ: Asia/Shanghai

    ports:
      # Dev-only loopback port for psql/admin tools on dev-01. Do not use this
      # database as the project business store; it is Agent Server runtime state.
      - "127.0.0.1:${LANGGRAPH_POSTGRES_HOST_PORT:-15432}:5432"

    volumes:
      - langgraph-postgres-data:/var/lib/postgresql/data

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

    logging:
      driver: json-file
      options:
        max-size: ${POSTGRES_LOG_MAX_SIZE:-20m}
        max-file: ${POSTGRES_LOG_MAX_FILE:-3}

    networks:
      veterinary-agent-dev:
        aliases:
          - postgres
          - agent-postgres
          - langgraph-db

networks:
  veterinary-agent-dev:
    name: veterinary-agent-dev
    driver: bridge

volumes:
  langgraph-postgres-data:
    name: veterinary-agent-langgraph-postgres-data
  langgraph-redis-data:
    name: veterinary-agent-langgraph-redis-data
