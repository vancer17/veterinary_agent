##################################################################################################
# 文件: alembic.ini
# 作用: 定义项目级 Alembic 迁移入口，统一管理兽医 Agent 各组件的数据库结构变更。
# 边界: 仅保存 Alembic 命令行与脚本位置配置；数据库连接由 DATABASE_URL 环境变量提供。
##################################################################################################

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
file_template = %%(rev)s_%%(slug)s
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
