# =============================================================================
# Backend CI — veterinary_agent 持续集成
# =============================================================================
#
# 【用途】
#   在代码合并到 main 后执行工程层质量门禁：静态检查、类型检查、单元测试、
#   包可构建验证。业务验收（安全红队、回归集、eval 等）由 tests/ / eval/
#   承载，不在本 workflow 脚本中实现业务逻辑。
#
# 【触发】
#   - pull_request 到 main（合并前门禁）
#   - push 到 main（PR merge 会产生 push 事件）
#
# 【Jobs】
#   lint      — Ruff lint + format check（src、tests）
#   typecheck — mypy（src、tests）
#   test      — uv lock 校验 + uv build + pytest（依赖 lint、typecheck 通过）
#   docker    — Docker 镜像构建冒烟（不推送）
#
# 【与 CD 的关系】
#   Backend CI 全部成功后，Backend CD 通过 workflow_run 自动触发镜像构建与推送。
#
# 【刻意未纳入（待后续实现）】
#   eval 回归门禁、业务安全红队硬门禁等。
#
# =============================================================================

name: Backend CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-groups --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-groups --frozen

      - name: Mypy
        run: uv run mypy

  test:
    name: Test
    runs-on: ubuntu-latest
    needs:
      - lint
      - typecheck
    env:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-groups --frozen

      - name: Verify uv lockfile
        run: uv lock --check

      - name: Verify package build
        run: uv build

      - name: Pytest
        run: uv run pytest

  docker:
    name: Docker build smoke
    runs-on: ubuntu-latest
    needs:
      - lint
      - typecheck
      - test
    env:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image without push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: false
          tags: veterinary_agent:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
