# =============================================================================
# Backend CI — xiaozhua-health-agent 持续集成
# =============================================================================
#
# 【用途】
#   在代码合并到 main 后执行工程层质量门禁：静态检查、类型检查、单元测试、
#   包可构建验证。业务验收（安全红队、回归集、eval 等）由 tests/ / eval/
#   承载，不在本 workflow 脚本中实现业务逻辑。
#
# 【触发】
#   - push 到 main（PR merge 会产生 push 事件）
#
# 【Jobs】
#   lint      — Ruff lint + format check（src、tests）
#   typecheck — mypy（src）
#   test      — uv build + pytest（依赖 lint、typecheck 通过）
#
# 【与 CD 的关系】
#   Backend CI 全部成功后，Backend CD 通过 workflow_run 自动触发镜像构建与推送。
#
# 【刻意未纳入（待后续实现）】
#   Docker 构建冒烟、eval 回归门禁、业务安全红队硬门禁等。
#
# =============================================================================

name: Backend CI

on:
  push:
    branches:
      - main

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Ruff format
        run: uv run ruff format --check src tests

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Mypy
        run: uv run mypy src

  test:
    name: Test
    runs-on: ubuntu-latest
    needs:
      - lint
      - typecheck
    env:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Verify package build
        run: uv build

      - name: Pytest
        run: uv run pytest
