# =============================================================================
# 文件: configs/vet_nonmedical_pet_care.yaml
# 作用: 定义 NonmedicalPetCareAgent 的建议规划、RAG、写作、自检与兜底策略默认配置。
# 边界: 不包含输入侧剖面判决、医疗诊断策略、发布门策略或任何敏感凭据。
# =============================================================================
enabled: true
config_version: nonmedical-pet-care-agent-config.v1
nonmedical_agent_version: nonmedical-pet-care-agent.v1
planner_version: nonmedical-advice-planner.v1
retrieval_planner_version: nonmedical-retrieval-planner.v1
writer_version: nonmedical-advice-writer.v1
self_checker_version: nonmedical-self-checker.v1
fallback_template_version: nonmedical-fallback-draft.v1
planner_agent_id: nonmedical_advice_dimension_planner
planner_agent_version: v1
retrieval_planner_agent_id: nonmedical_knowledge_retrieval_planner
retrieval_planner_agent_version: v1
writer_agent_id: nonmedical_advice_writer
writer_agent_version: v1
self_checker_agent_id: nonmedical_safety_practicality_checker
self_checker_agent_version: v1
allowed_dimensions:
  - GOAL_CLARIFICATION
  - APPLICABILITY_CHECK
  - STEPWISE_PLAN
  - GRADUAL_PACE
  - OBSERVATION_METRICS
  - RISK_BOUNDARY
  - ALTERNATIVE_OPTIONS
  - MISCONCEPTION_WARNING
  - PROFESSIONAL_ESCALATION
max_draft_chars: 5000
timeouts:
  total_seconds: 10.0
  planner_seconds: 2.0
  retrieval_planner_seconds: 2.0
  rag_seconds: 1.5
  writer_seconds: 4.0
  self_check_seconds: 2.0
rag:
  enabled: true
  required_for_signal: true
  top_k: 5
  max_facets: 5
  default_collections:
    - pet_care_kb_public_mvp
  rerank_enabled: true
rules:
  enabled: true
  rule_library_version: nonmedical-rule-library.v1
  allow_low_risk_rule_fallback: true
