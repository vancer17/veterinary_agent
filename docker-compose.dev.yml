# File: docker-compose.dev.yml
# Purpose: Local development orchestration for Vet Agent.
# Topology: Mirrors production with one pgvector PostgreSQL container and logical
#           databases for Vet Agent, LiteLLM, Mem0 vector storage, and Mem0 API data.
# Usage: Run with `docker compose --env-file deploy/env/dev/compose.env.template -f docker-compose.dev.yml ...`.

# 开发环境默认读取 *.env.template；若需要本地覆盖密钥或端口，可复制为同名 *.env，
# Compose 会按顺序加载，后加载的真实 *.env 覆盖模板值。
x-postgres-env-files: &postgres-env-files
  - path: ${ENV_DIR:-./deploy/env/dev}/services/postgres.env.template
    required: true
  - path: ${ENV_DIR:-./deploy/env/dev}/services/postgres.env
    required: false

x-litellm-env-files: &litellm-env-files
  - path: ${ENV_DIR:-./deploy/env/dev}/services/litellm.env.template
    required: true
  - path: ${ENV_DIR:-./deploy/env/dev}/services/litellm.env
    required: false

x-mem0-env-files: &mem0-env-files
  - path: ${ENV_DIR:-./deploy/env/dev}/services/mem0.env.template
    required: true
  - path: ${ENV_DIR:-./deploy/env/dev}/services/mem0.env
    required: false

x-app-env-files: &app-env-files
  - path: ${ENV_DIR:-./deploy/env/dev}/services/app.env.template
    required: true
  - path: ${ENV_DIR:-./deploy/env/dev}/services/app.env
    required: false

name: ${COMPOSE_PROJECT_NAME:-vet-agent-dev}

services:
  postgres:
    image: ${PGVECTOR_IMAGE:-pgvector/pgvector:pg16}
    container_name: vet-agent-dev-postgres
    restart: unless-stopped
    shm_size: "256mb"
    env_file: *postgres-env-files
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - vet_agent_dev_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20

  litellm:
    image: ${LITELLM_IMAGE:-ghcr.io/berriai/litellm:main-stable}
    container_name: vet-agent-dev-litellm
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: *litellm-env-files
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      - ./docker/litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "${LITELLM_WORKERS:-2}"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/readiness', timeout=3).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 30

  mem0:
    image: ${MEM0_IMAGE:-crpi-efmmpn9a6t9mspwy.cn-hangzhou.personal.cr.aliyuncs.com/vancer-saas/mem0:latest}
    container_name: vet-agent-dev-mem0
    restart: unless-stopped
    depends_on:
      litellm:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file: *mem0-env-files
    ports:
      - "${MEM0_PORT:-8001}:8000"
    volumes:
      - vet_agent_dev_mem0_history:/app/history
    command: >
      sh -c "python -c 'import psycopg' 2>/dev/null || pip install --no-cache-dir psycopg-binary
      && alembic upgrade head
      && uvicorn main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs', timeout=3).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 30

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-ghcr.io/astral-sh/uv:python3.12-bookworm}
    container_name: vet-agent-dev-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      litellm:
        condition: service_healthy
      mem0:
        condition: service_healthy
    env_file: *app-env-files
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - .:/app
    command: >
      sh -c "alembic upgrade head
      && if [ \"$${SEED_WITH_EMBEDDINGS:-false}\" = \"true\" ]; then
      python scripts/seed_database.py --with-embeddings;
      else
      python scripts/seed_database.py;
      fi
      && uvicorn vet_agent.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  vet_agent_dev_pgdata:
  vet_agent_dev_mem0_history:
