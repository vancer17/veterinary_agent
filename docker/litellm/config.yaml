# File: docker/litellm/config.yaml
# Purpose: LiteLLM proxy configuration for Qwen chat, vision, and embedding models.
# Persistence: LiteLLM reads DATABASE_URL from the compose environment; in this
#              project it points to the shared PostgreSQL instance's litellm DB.

model_list:
  - model_name: qwen-plus
    litellm_params:
      model: openai/qwen-plus
      api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
      api_key: os.environ/DASHSCOPE_API_KEY

  - model_name: qwen-vl-plus
    litellm_params:
      model: openai/qwen-vl-plus
      api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
      api_key: os.environ/DASHSCOPE_API_KEY

  - model_name: text-embedding-v4
    litellm_params:
      model: openai/text-embedding-v4
      api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
      api_key: os.environ/DASHSCOPE_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

litellm_settings:
  request_timeout: 60
  drop_params: true
