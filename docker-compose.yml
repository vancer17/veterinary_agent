# File: docker-compose.yml
# Purpose: Production orchestration for Vet Agent and its middleware.
# Topology: A single pgvector PostgreSQL instance hosts isolated logical databases
#           for Vet Agent, LiteLLM, and Mem0. Application schemas are migrated by
#           the owning service tools: project Alembic, LiteLLM, and Mem0 Alembic.
# Usage: Run with `docker compose --env-file deploy/env/prod/compose.env -f docker-compose.yml ...`.

name: ${COMPOSE_PROJECT_NAME:-vet-agent-prod}

# 运行时配置统一放在 deploy/env/prod/services/*.env 中。
# *.env.template 提供可提交的默认结构，*.env 为真实部署文件且应由运维平台或人工安全下发。
x-postgres-env-files: &postgres-env-files
  - path: ${ENV_DIR:-./deploy/env/prod}/services/postgres.env.template
    required: true
  - path: ${ENV_DIR:-./deploy/env/prod}/services/postgres.env
    required: false

x-litellm-env-files: &litellm-env-files
  - path: ${ENV_DIR:-./deploy/env/prod}/services/litellm.env.template
    required: true
  - path: ${ENV_DIR:-./deploy/env/prod}/services/litellm.env
    required: false

x-mem0-env-files: &mem0-env-files
  - path: ${ENV_DIR:-./deploy/env/prod}/services/mem0.env.template
    required: true
  - path: ${ENV_DIR:-./deploy/env/prod}/services/mem0.env
    required: false

x-app-env-files: &app-env-files
  - path: ${ENV_DIR:-./deploy/env/prod}/services/app.env.template
    required: true
  - path: ${ENV_DIR:-./deploy/env/prod}/services/app.env
    required: false

x-logging: &default-logging
  driver: json-file
  options:
    max-size: ${LOG_MAX_SIZE:-20m}
    max-file: ${LOG_MAX_FILE:-5}

x-app-build: &app-build
  context: .
  dockerfile: Dockerfile
  args:
    PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-ghcr.io/astral-sh/uv:python3.12-bookworm}

x-app-common: &app-common
  image: ${VET_AGENT_IMAGE:-vet-agent:prod}
  build: *app-build
  env_file: *app-env-files
  networks:
    - backend
  logging: *default-logging

services:
  postgres:
    image: ${PGVECTOR_IMAGE:-pgvector/pgvector:pg16}
    restart: unless-stopped
    shm_size: "256mb"
    env_file: *postgres-env-files
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - backend
    logging: *default-logging

  litellm:
    image: ${LITELLM_IMAGE:-ghcr.io/berriai/litellm:main-stable}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: *litellm-env-files
    volumes:
      - ./docker/litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "${LITELLM_WORKERS:-2}"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/readiness', timeout=3).read()\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 30
    networks:
      - backend
    logging: *default-logging

  mem0:
    image: ${MEM0_IMAGE:-crpi-efmmpn9a6t9mspwy.cn-hangzhou.personal.cr.aliyuncs.com/vancer-saas/mem0:latest}
    restart: unless-stopped
    depends_on:
      litellm:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file: *mem0-env-files
    volumes:
      - mem0_history:/app/history
    command: >
      sh -c "python -c 'import psycopg' 2>/dev/null || pip install --no-cache-dir psycopg-binary
      && alembic upgrade head
      && uvicorn main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs', timeout=3).read()\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 30
    networks:
      - backend
    logging: *default-logging

  migrate:
    <<: *app-common
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    profiles: ["ops"]

  seed:
    <<: *app-common
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      litellm:
        condition: service_healthy
    command: >
      sh -c 'if [ "$${SEED_WITH_EMBEDDINGS:-false}" = "true" ]; then
      python scripts/seed_database.py --with-embeddings;
      else
      python scripts/seed_database.py;
      fi'
    profiles: ["ops"]

  app:
    <<: *app-common
    restart: unless-stopped
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      litellm:
        condition: service_healthy
      mem0:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8000}:8000"
    command:
      [
        "uvicorn",
        "vet_agent.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--workers",
        "${APP_WORKERS:-2}",
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 30

networks:
  backend:

volumes:
  postgres_data:
  mem0_history:
