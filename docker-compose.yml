services:
  postgres:
    image: ${PGVECTOR_IMAGE:-pgvector/pgvector:pg16}
    container_name: vet-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vet_agent}
      POSTGRES_USER: ${POSTGRES_USER:-vet_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vet_agent}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - vet_agent_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vet_agent} -d ${POSTGRES_DB:-vet_agent}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  vet_agent_pgdata:
