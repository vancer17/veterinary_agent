[project]
name = "veterinary-agent"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "pydantic>=2.7,<3",
    "pydantic-settings>=2.3,<3",
]

[dependency-groups]
dev = [
    "mypy>=1.11,<2",
    "pytest>=8.2,<9",
    "ruff>=0.8,<1",
]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
addopts = "-ra"

[tool.ruff]
line-length = 88
target-version = "py313"

[tool.ruff.lint]
select = [
    "A",
    "ANN",
    "ARG",
    "ASYNC",
    "B",
    "C4",
    "E",
    "F",
    "I",
    "N",
    "PERF",
    "PIE",
    "PL",
    "PT",
    "RET",
    "RUF",
    "SIM",
    "UP",
    "W",
]
ignore = [
    "ANN401",
    "RUF001",
    "RUF002",
    "RUF003",
]

[tool.mypy]
python_version = "3.13"
files = ["src", "tests"]
strict = true
pretty = true
show_error_codes = true
